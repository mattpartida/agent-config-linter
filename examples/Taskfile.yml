version: '3'

tasks:
  lint-agent-configs:
    desc: Lint agent configuration examples and fail on high or critical findings
    cmds:
      - agent-config-lint examples --fail-on high --min-severity medium --format json

  agent-config-sarif:
    desc: Generate a SARIF preview artifact for GitHub code scanning
    cmds:
      - agent-config-lint examples --format sarif > agent-config-linter.sarif

  local-ci:
    desc: Run local project checks
    cmds:
      - python -m ruff check .
      - python -m compileall -q src tests
      - python -m pytest -q
