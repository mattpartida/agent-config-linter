name: agent-config-linter staged enforcement

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-agent-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install agent-config-linter
        run: python -m pip install --upgrade pip agent-config-linter

      - name: Run staged policy gate
        run: agent-config-lint . --policy examples/policies/staged-ci.yaml --min-severity medium --fail-on high --format json
