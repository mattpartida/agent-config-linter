name: Agent Config Linter Code Scanning

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  agent-config-linter:
    name: Upload agent-config-linter SARIF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # In another repository, replace "." with the directory or file glob that
      # contains your agent runtime configs. Directory inputs are scanned
      # recursively for JSON, YAML, and TOML config files.
      - name: Install agent-config-linter
        run: python -m pip install --upgrade pip -e .

      - name: Generate SARIF report
        run: |
          set +e
          agent-config-lint . --format sarif > agent-config-linter.sarif 2>&1
          status=$?
          set -e
          python -m json.tool agent-config-linter.sarif > /dev/null
          if [ "$status" -gt 2 ]; then
            exit "$status"
          fi

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: agent-config-linter.sarif
