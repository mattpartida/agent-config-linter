name: agent-config-linter code scanning

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  upload-sarif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install agent-config-linter
        run: python -m pip install --upgrade pip agent-config-linter

      - name: Generate SARIF report
        run: agent-config-lint . --format sarif > agent-config-linter.sarif

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: agent-config-linter.sarif
